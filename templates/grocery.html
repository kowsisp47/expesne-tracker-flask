<!DOCTYPE html>
<html>
<head>
    <title>Mini Grocery Store</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px;
            background: green;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        .delete-btn {
            background: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Mini Grocery Store</h2>

    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="Product Name" required>
        <input type="number" name="price" placeholder="Price" required>
        <button type="submit">Add</button>
    </form>

    <table>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Action</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.price }}</td>
            <td>
                <a href="/delete/{{ loop.index0 }}">
                    <button class="delete-btn">Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
